name: Android E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Tests
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Or your specific Node.js version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decrypt or Load environment variables
        # Assuming you will configure EMAIL and PASSWORD in GitHub Secrets
        run: |
          echo "EMAIL=${{ secrets.EMAIL }}" >> $GITHUB_ENV
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> $GITHUB_ENV

      - name: Run E2E Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Use an appropriate API level for your APK (e.g., 30, 31, 33)
          api-level: 33 
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          # Starts emulator and runs the test command
          script: npm run test